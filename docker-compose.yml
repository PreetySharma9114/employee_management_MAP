services:

  # -------------------------------------------------------------------------
  # Infrastructure
  # -------------------------------------------------------------------------

  activemq:
    image: apache/activemq-classic:5.18.3
    container_name: activemq
    ports:
      - "8161:8161"     # Admin Web Console  (admin/admin)
      - "61613:61613"   # STOMP (needed if you want to send test messages from host)
    environment:
      - ACTIVEMQ_CONNECTION_USER=admin
      - ACTIVEMQ_CONNECTION_PASSWORD=admin
    networks:
      - employee-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8161/admin/ -u admin:admin || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # -------------------------------------------------------------------------
  # Existing services
  # -------------------------------------------------------------------------

  grpc-service:
    build:
      context: ./grpc-service
      dockerfile: Dockerfile
    container_name: payroll-grpc-service
    ports:
      - "15051:50051"   # host:container — use localhost:15051 in Postman
    networks:
      - employee-network
    environment:
      - GRPC_PORT=50051

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: employee-backend
    ports:
      - "3001:3001"
    networks:
      - employee-network
    environment:
      - PORT=3001
      - GRPC_HOST=grpc-service
      - GRPC_PORT=50051
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
      - ACTIVEMQ_USER=admin
      - ACTIVEMQ_PASS=admin
      - AUTH_GRPC_HOST=auth-service
      - AUTH_GRPC_PORT=50052
      - DEPT_GRPC_HOST=department-service
      - DEPT_GRPC_PORT=50054
    depends_on:
      - grpc-service
      - activemq

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: employee-frontend
    ports:
      - "80:80"
    networks:
      - employee-network
    depends_on:
      - backend

  # -------------------------------------------------------------------------
  # New microservices
  # -------------------------------------------------------------------------

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "3002:3002"
      - "15052:50052"   # gRPC — host:container, use localhost:15052 in Postman
    networks:
      - employee-network
    environment:
      - PORT=3002
      - GRPC_PORT=50052
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=24h
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
      - ACTIVEMQ_USER=admin
      - ACTIVEMQ_PASS=admin
      - NODE_ENV=production
    depends_on:
      activemq:
        condition: service_healthy

  leave-service:
    build:
      context: ./leave-service
      dockerfile: Dockerfile
    container_name: leave-service
    ports:
      - "3003:3003"
      - "15053:50053"   # gRPC — host:container, use localhost:15053 in Postman
    networks:
      - employee-network
    environment:
      - PORT=3003
      - GRPC_PORT=50053
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
      - ACTIVEMQ_USER=admin
      - ACTIVEMQ_PASS=admin
      - NODE_ENV=production
    depends_on:
      activemq:
        condition: service_healthy

  attendance-service:
    build:
      context: ./attendance-service
      dockerfile: Dockerfile
    container_name: attendance-service
    ports:
      - "3004:3004"
    networks:
      - employee-network
    environment:
      - PORT=3004
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
      - ACTIVEMQ_USER=admin
      - ACTIVEMQ_PASS=admin
      - NODE_ENV=production
    depends_on:
      activemq:
        condition: service_healthy

  department-service:
    build:
      context: ./department-service
      dockerfile: Dockerfile
    container_name: department-service
    ports:
      - "3005:3005"
      - "15054:50054"   # gRPC — host:container, use localhost:15054 in Postman
    networks:
      - employee-network
    environment:
      - PORT=3005
      - GRPC_PORT=50054
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
      - ACTIVEMQ_USER=admin
      - ACTIVEMQ_PASS=admin
      - NODE_ENV=production
    depends_on:
      activemq:
        condition: service_healthy

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "3006:3006"
    networks:
      - employee-network
    environment:
      - PORT=3006
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61613
      - ACTIVEMQ_USER=admin
      - ACTIVEMQ_PASS=admin
      - NODE_ENV=production
    depends_on:
      activemq:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # NGINX API Gateway
  # -------------------------------------------------------------------------

  nginx-gateway:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-gateway
    ports:
      - "8080:8080"     # HTTP API Gateway
    networks:
      - employee-network
    depends_on:
      - backend
      - auth-service
      - leave-service
      - attendance-service
      - department-service
      - notification-service

networks:
  employee-network:
    driver: bridge

volumes:
  grpc-data:
    driver: local
