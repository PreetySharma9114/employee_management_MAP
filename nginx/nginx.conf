worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # -----------------------------------------------------------------------
  # Logging format
  # -----------------------------------------------------------------------
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # -----------------------------------------------------------------------
  # Upstream pools (enables load-balancing when scaled with docker-compose)
  # -----------------------------------------------------------------------
  upstream employee_backend {
    least_conn;
    server employee-backend:3001;
    # server employee-backend-2:3001;  # uncomment for multi-instance
  }

  upstream auth_service {
    least_conn;
    server auth-service:3002;
  }

  upstream leave_service {
    least_conn;
    server leave-service:3003;
  }

  upstream attendance_service {
    least_conn;
    server attendance-service:3004;
  }

  upstream department_service {
    least_conn;
    server department-service:3005;
  }

  upstream notification_service {
    least_conn;
    server notification-service:3006;
  }

  # -----------------------------------------------------------------------
  # Rate limiting zones
  # -----------------------------------------------------------------------
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

  # -----------------------------------------------------------------------
  # Main API Gateway server — listens on port 8080 (HTTP)
  # For production, replace with port 443 + ssl_certificate directives
  # -----------------------------------------------------------------------
  server {
    listen 8080;
    server_name _;

    # Global proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;

    # ------------------------------------------------------------------
    # Health check aggregation
    # ------------------------------------------------------------------
    location /health {
      return 200 '{"success":true,"service":"nginx-gateway","status":"ok"}';
      add_header Content-Type application/json;
    }

    # ------------------------------------------------------------------
    # Auth Service  →  /api/auth/**
    # ------------------------------------------------------------------
    location /api/auth/ {
      limit_req zone=auth_limit burst=10 nodelay;
      proxy_pass http://auth_service/api/;
    }

    # ------------------------------------------------------------------
    # Employee Service  →  /api/employees/**
    # ------------------------------------------------------------------
    location /api/employees/ {
      limit_req zone=api_limit burst=50 nodelay;
      proxy_pass http://employee_backend/api/employees/;
    }

    # ------------------------------------------------------------------
    # Department Service  →  /api/departments/**
    # ------------------------------------------------------------------
    location /api/departments/ {
      limit_req zone=api_limit burst=30 nodelay;
      proxy_pass http://department_service/api/departments/;
    }

    # ------------------------------------------------------------------
    # Leave Service  →  /api/leaves/**  and  /api/employees/:id/leaves/**
    # ------------------------------------------------------------------
    location /api/leaves/ {
      limit_req zone=api_limit burst=30 nodelay;
      proxy_pass http://leave_service/api/leaves/;
    }

    location ~ ^/api/employees/([^/]+)/leaves(/.*)?$ {
      limit_req zone=api_limit burst=30 nodelay;
      proxy_pass http://leave_service/api/employees/$1/leaves$2;
    }

    # ------------------------------------------------------------------
    # Attendance Service  →  /api/attendance/**  and  /api/employees/:id/attendance/**
    # ------------------------------------------------------------------
    location /api/attendance/ {
      limit_req zone=api_limit burst=30 nodelay;
      proxy_pass http://attendance_service/api/attendance/;
    }

    location ~ ^/api/employees/([^/]+)/attendance(/.*)?$ {
      limit_req zone=api_limit burst=30 nodelay;
      proxy_pass http://attendance_service/api/employees/$1/attendance$2;
    }

    # ------------------------------------------------------------------
    # Notification Service health
    # ------------------------------------------------------------------
    location /api/notifications/health {
      proxy_pass http://notification_service/health;
    }

    # ------------------------------------------------------------------
    # Frontend SPA  →  everything else
    # ------------------------------------------------------------------
    location / {
      proxy_pass http://employee-frontend:80;
    }

    # ------------------------------------------------------------------
    # Error pages
    # ------------------------------------------------------------------
    error_page 502 503 504 /gateway_error.json;
    location = /gateway_error.json {
      return 503 '{"success":false,"message":"Service temporarily unavailable. Please try again later."}';
      add_header Content-Type application/json;
    }
  }
}

# -----------------------------------------------------------------------
# gRPC stream block — forwards gRPC traffic to individual services
# Requires nginx compiled with --with-stream (available in nginx:alpine)
# -----------------------------------------------------------------------
stream {
  # Auth gRPC
  upstream auth_grpc {
    server auth-service:50052;
  }

  # Leave gRPC
  upstream leave_grpc {
    server leave-service:50053;
  }

  # Department gRPC
  upstream department_grpc {
    server department-service:50054;
  }

  # Payroll gRPC (existing)
  upstream payroll_grpc {
    server payroll-grpc-service:50051;
  }

  server {
    listen 50052;
    proxy_pass auth_grpc;
    proxy_connect_timeout 5s;
    proxy_timeout 30s;
  }

  server {
    listen 50053;
    proxy_pass leave_grpc;
    proxy_connect_timeout 5s;
    proxy_timeout 30s;
  }

  server {
    listen 50054;
    proxy_pass department_grpc;
    proxy_connect_timeout 5s;
    proxy_timeout 30s;
  }

  server {
    listen 50051;
    proxy_pass payroll_grpc;
    proxy_connect_timeout 5s;
    proxy_timeout 30s;
  }
}
