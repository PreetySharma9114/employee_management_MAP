worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Docker's internal DNS — defer resolution to request time
  resolver 127.0.0.11 valid=30s ipv6=off;

  log_format main '$remote_addr [$time_local] "$request" $status';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

  server {
    listen 8080;
    server_name _;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;

    location /health {
      return 200 '{"success":true,"service":"nginx-gateway","status":"ok"}';
      add_header Content-Type application/json;
    }

    # Auth — strip /auth prefix
    location /api/auth {
      limit_req zone=auth_limit burst=10 nodelay;
      set $auth_host auth-service:3002;
      rewrite ^/api/auth(/.*)?$ /api$1 break;
      proxy_pass http://$auth_host;
    }

    # Department
    location /api/departments {
      limit_req zone=api_limit burst=30 nodelay;
      set $dept_host department-service:3005;
      proxy_pass http://$dept_host;
    }

    # Leave
    location /api/leaves {
      limit_req zone=api_limit burst=30 nodelay;
      set $leave_host leave-service:3003;
      proxy_pass http://$leave_host;
    }

    # Attendance
    location /api/attendance {
      limit_req zone=api_limit burst=30 nodelay;
      set $att_host attendance-service:3004;
      proxy_pass http://$att_host;
    }

    # Employee leave sub-routes
    location ~ ^/api/employees/[^/]+/leaves {
      limit_req zone=api_limit burst=30 nodelay;
      set $leave_host leave-service:3003;
      proxy_pass http://$leave_host;
    }

    # Employee attendance sub-routes
    location ~ ^/api/employees/[^/]+/attendance {
      limit_req zone=api_limit burst=30 nodelay;
      set $att_host attendance-service:3004;
      proxy_pass http://$att_host;
    }

    # Employee backend + payroll (catch-all)
    location /api {
      limit_req zone=api_limit burst=50 nodelay;
      set $be_host employee-backend:3001;
      proxy_pass http://$be_host;
    }

    # Notification health
    location /api/notifications/health {
      set $notif_host notification-service:3006;
      proxy_pass http://$notif_host/health;
    }

    # Frontend SPA
    location / {
      set $fe_host employee-frontend:80;
      proxy_pass http://$fe_host;
    }

    error_page 502 503 504 @gateway_error;
    location @gateway_error {
      return 503 '{"success":false,"message":"Service temporarily unavailable."}';
      add_header Content-Type application/json;
    }
  }
}
